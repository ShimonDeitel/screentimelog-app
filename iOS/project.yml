name: ScreentimeLog
options:
  bundleIdPrefix: com.shimondeitel.screentimelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ScreentimeLog:
    type: application
    platform: iOS
    sources:
      - path: ScreentimeLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.screentimelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ScreentimeLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ScreentimeLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScreentimeLogTests
      - path: ScreentimeLog.storekit
    dependencies:
      - target: ScreentimeLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.screentimelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ScreentimeLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ScreentimeLogUITests
    dependencies:
      - target: ScreentimeLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.screentimelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ScreentimeLog:
    build:
      targets:
        ScreentimeLog: all
        ScreentimeLogTests: [test]
        ScreentimeLogUITests: [test]
    test:
      targets:
        - ScreentimeLogTests
        - ScreentimeLogUITests
